name: Deploy Pipeline

on:
  push:
    branches: [main]
    paths:
      - 'app.py'
      - 'config.py'
      - 'Dockerfile'
      - 'requirements.txt'
      - 'docker-compose.yml'

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Staging
        run: |
          echo "Deploying to staging..."
          echo "Commit: ${{ github.sha }}"

      - name: Job Summary
        run: |
          echo "## Staging Deployment" >> $GITHUB_STEP_SUMMARY
          echo "Commit ${{ github.sha }} deployed" >> $GITHUB_STEP_SUMMARY

      - name: Notify
        run: echo "Slack notification: Deployment to staging successful"

  deploy-production:
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Production
        run: |
          echo "Deploying to production..."
          echo "Commit: ${{ github.sha }}"

      - name: Notify
        run: echo "Slack notification: Deployment to production successful"